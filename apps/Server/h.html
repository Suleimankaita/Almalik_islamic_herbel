<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        
        const arr=[1,2,3,4,5,6]
        const S=3;
        let left=0;
        let sum=0;
        let minlength=Infinity;
        for (let right = 0; right < arr.length; right++) {
            sum+=arr[right];

            while(sum>=S){
                minlength=Math.min(minlength,right-left+1)
                sum-=arr[left]
                left++
            }
        }
        console.log(minlength)

    </script>
</body>
</html>
